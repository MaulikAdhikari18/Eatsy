workflows:
  ios-simulator-workflow:
    name: iOS Simulator Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - app_config
      flutter: stable
    scripts:
      - name: Get Flutter packages
        script: flutter packages pub get

      - name: Generate app_config.dart
        script: |
          mkdir -p lib/core/config
          cat > lib/core/config/app_config.dart << EOF
          class AppConfig {
            static const String supabaseUrl = '$SUPABASE_URL';
            static const String supabaseKey = '$SUPABASE_KEY';
            static const String fatSecretClientId = '$FATSECRET_CLIENT_ID';
            static const String fatSecretClientSecret = '$FATSECRET_CLIENT_SECRET';
            static const String groqApiKey = '$GROQ_API_KEY';
          }
          EOF

      - name: Disable Swift Package Manager
        script: flutter config --no-enable-swift-package-manager

      - name: Clean everything
        script: |
          flutter clean
          rm -rf ios/Pods ios/Podfile.lock ios/.symlinks ios/Flutter/Flutter.podspec

      - name: Reinstall CocoaPods
        script: |
          flutter packages pub get
          cd ios
          pod install --repo-update
          cd ..

      - name: Build iOS (Simulator, no signing)
        script: flutter build ios --simulator --debug
    artifacts:
      - build/ios/iphonesimulator/*.app