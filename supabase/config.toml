[functions.fatsecret-proxy]
enabled = true
verify_jwt = false
import_map = "./functions/fatsecret-proxy/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/fatsecret-proxy/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/fatsecret-proxy/*.html" ]

[functions.groq-proxy]
enabled = true
# true, unlike fatsecret-proxy above — Supabase rejects any request
# without a valid logged-in user's JWT before this function even runs.
# Groq is a metered, billed API; an open proxy URL would be a direct
# path to abuse, not just a rate-limit nuisance the way an open
# FatSecret proxy would be.
verify_jwt = true
import_map = "./functions/groq-proxy/deno.json"
entrypoint = "./functions/groq-proxy/index.ts"

[functions.delete-account]
enabled = true
# true — same reasoning as groq-proxy. This function also holds the
# service-role key, which can bypass RLS entirely and delete a login
# outright, so it's the last function that should ever be left open to
# unauthenticated requests.
verify_jwt = true
import_map = "./functions/delete-account/deno.json"
entrypoint = "./functions/delete-account/index.ts"